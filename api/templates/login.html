<!DOCTYPE html>
<html lang="en" class="bg-gray-900 text-white">

<head>
    <meta charset="UTF-8">
    <title>RecoSys | Thesis Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="flex items-center justify-center min-h-screen">
    <div class="bg-gray-800 p-8 rounded-lg shadow-2xl w-full max-w-md">
        <h1 class="text-3xl font-bold text-red-600 mb-2">RecoSys</h1>
        <p class="text-gray-400 mb-6">BSc Computing Thesis Prototype</p>

        <form action="/login" method="post">
            <label class="block text-sm font-medium text-gray-300 mb-2">Select Synthetic Cohort Profile</label>
            <select name="user_id"
                class="w-full bg-gray-700 border border-gray-600 rounded p-3 mb-4 text-white focus:ring-red-500 focus:border-red-500">
                {% for u in users %}
                <option value="{{ u.user_id }}">
                    ID: {{ u.user_id }} | {{ u.cohort_group }} | {{ u.preferred_genres }}
                    {% if u.is_cold_start %} (COLD START) {% endif %}
                </option>
                {% endfor %}
            </select>
            <button type="submit"
                class="w-full bg-red-600 hover:bg-red-700 text-white font-bold py-3 rounded transition">
                Enter Prototype
            </button>
        </form>
    </div>
</body>

</html>
